        .stat-box span { display: block; font-size: 20px; font-weight: bold; color: #ffeb3b; }
        #meaning-display { text-align: center; font-size: 20px; font-weight: bold; color: var(--secondary); margin-bottom: 10px; min-height: 30px; }

    let customs = JSON.parse(localStorage.getItem('rah_v11_cust')) || [];
    let chars = [], timer = null, time = 0, active = false, done = false;
    const segmenter = new Intl.Segmenter('bn', { granularity: 'grapheme' });

    const bijoyMap = {
        'q': 'ঙ', 'w': 'য', 'e': 'ড', 'r': 'প', 't': 'ট', 'y': 'চ', 'u': 'জ', 'i': 'হ', 'o': 'গ', 'p': 'ড়', '\\': 'ৎ',
        'a': 'ৃ', 's': 'ু', 'd': 'ি', 'f': 'া', 'g': '্', 'h': 'ব', 'j': 'ক', 'k': 'ত', 'l': 'দ',
        'z': '্র', 'x': 'ও', 'c': 'ে', 'v': 'র', 'b': 'ন', 'n': 'স', 'm': 'ম',
        'Q': 'ং', 'W': 'য়', 'E': 'ঢ', 'R': 'ফ', 'T': 'ঠ', 'Y': 'ছ', 'U': 'ঝ', 'I': 'ঞ', 'O': 'ঘ', 'P': 'ঢ়','|': 'ঃ',
        'A': 'র্', 'S': 'ূ', 'D': 'ী', 'F': 'অ', 'G': '।', 'H': 'ভ', 'J': 'খ', 'K': 'থ', 'L': 'ধ',
        'Z': '্য', 'X': 'ৗ', 'C': 'ৈ', 'V': 'ল', 'B': 'ণ', 'N': 'ষ', 'M': 'শ',
        '1': '১', '2': '২', '3': '৩', '4': '৪', '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯', '0': '০', '&': 'ঁ'
    };

    // ১. প্রথমে initApp ফাংশনটি এভাবে আপডেট করুন
function initApp() {
    const lang = document.getElementById('lang').value;
    const mode = document.getElementById('mode').value;
    const sel = document.getElementById('lesson-sel');
    let pool = [];
    const englishWords = Object.keys(meanings);

    if (mode === 'words') {
        const src = (lang === 'bn' ? bnW : englishWords);
        pool = src.map((w, i) => {
            let text = lang === 'en' ? (w.charAt(0).toUpperCase() + w.slice(1).toLowerCase() + (" " + w.toLowerCase()).repeat(4)) : Array(5).fill(w).join(' ');
            return { n: `W-${i+1}: ${w}`, t: text, m: lang === 'en' ? meanings[w] : "" };
        });
    } else if (mode === 'para') {
        const src = (lang === 'bn' ? bnP : enP);
        for (let i = 0; i < src.length; i += 10) {
            pool.push({ n: `Set: ${Math.floor(i/10) + 1}`, t: src.slice(i, i + 10).join(' '), m: "" });
        }
    } else if (mode === 'custom') {
        pool = customs.map((c, i) => ({ n: `Saved-${i+1}`, t: c, m: "" }));
    }
    
    window.activePool = pool;
    sel.innerHTML = pool.map((d, i) => `<option value="${i}">${d.n}</option>`).join('');

    // এখানে হিস্টোরি লোড হচ্ছে
    const storageKey = `rah_last_idx_${lang}_${mode}`;
    const savedIdx = localStorage.getItem(storageKey);
    if (savedIdx !== null && sel.options[savedIdx]) {
        sel.value = savedIdx;
    } else {
        sel.value = 0;
    }
    
    loadLesson();
}

// ২. এরপর এই loadLesson ফাংশনটি রাখুন
function loadLesson() {
    const lang = document.getElementById('lang').value;
    const mode = document.getElementById('mode').value;
    const idx = document.getElementById('lesson-sel').value;
    
    // বর্তমান ইনডেক্স সেভ করে রাখা
    localStorage.setItem(`rah_last_idx_${lang}_${mode}`, idx);

    if(window.activePool && window.activePool[idx]) {
        const data = window.activePool[idx];
        document.getElementById('meaning-display').innerText = data.m ? `অর্থ: ${data.m}` : "";
        chars = Array.from(segmenter.segment(data.t)).map(s => s.segment);
        document.getElementById('display-text').innerHTML = chars.map((c, i) => `<span id="s-${i}" class="char">${c}</span>`).join('');
        resetApp();
    }
}


    const input = document.getElementById('input-area');

    let state = {
        pendingKar: "",
        gPressed: false
    };

    input.addEventListener('keydown', function(e) {
        const currentLang = document.getElementById('lang').value;
        if (currentLang === 'en') return;

        if (currentLang === 'bn') {
            if (e.ctrlKey || e.altKey || e.metaKey || e.key.length > 1) return;

            if (e.key === 'Backspace') {
                state.pendingKar = "";
                state.gPressed = false;
                return;
            }

            if (bijoyMap.hasOwnProperty(e.key)) {
                e.preventDefault();
                let char = bijoyMap[e.key];
                let start = this.selectionStart;
                let end = this.selectionEnd;
                let val = this.value;

                if (e.key === ' ') {
                    state.pendingKar = "";
                    state.gPressed = false;
                    this.value = val.substring(0, start) + ' ' + val.substring(end);
                    this.selectionStart = this.selectionEnd = start + 1;
                    this.dispatchEvent(new Event('input'));
                    return;
                }

                if (e.key === 'g') {
                    state.gPressed = true;
                    return;
                }

                if (state.gPressed) {
                    let sworoborno = "";
                    if (e.key === 'd') sworoborno = 'ই';
                    else if (e.key === 'D') sworoborno = 'ঈ';
                    else if (e.key === 's') sworoborno = 'উ';
                    else if (e.key === 'S') sworoborno = 'ঊ';
                    else if (e.key === 'a') sworoborno = 'ঋ';
                    else if (e.key === 'c') sworoborno = 'এ';
                    else if (e.key === 'C') sworoborno = 'ঐ';
                    else if (e.key === 'x') sworoborno = 'ও';
                    else if (e.key === 'X') sworoborno = 'ঔ';
                    else if (e.key === 'f') sworoborno = 'আ';

                    if (sworoborno !== "") {
                        state.pendingKar = "";
                        state.gPressed = false;
                        this.value = val.substring(0, start) + sworoborno + val.substring(end);
                        this.selectionStart = this.selectionEnd = start + sworoborno.length;
                        this.dispatchEvent(new Event('input'));
                        return;
                    } else {
                        char = '্' + char;
                        state.gPressed = false;
                    }
                }

                if (['ে', 'ি', 'ৈ', ].includes(char) && state.pendingKar === "") {
                    state.pendingKar = char;
                    return;
                }

                if (e.key === 'A') {
                    if (start > 0) {
                        let textBefore = val.substring(0, start);
                        let lastChar = textBefore.slice(-1);
                        let restText = textBefore.slice(0, -1);
                        let finalBefore = "";

                        if (['ে', 'ি', 'ৈ', 'ৗ', 'ো', 'ৌ', 'া', 'ী', 'ূ', 'ু', 'ৃ'].includes(lastChar)) {
                            let targetChar = restText.slice(-1);
                            finalBefore = restText.slice(0, -1) + "র্" + targetChar + lastChar;
                        } else {
                            finalBefore = restText + "র্" + lastChar;
                        }

                        this.value = finalBefore + val.substring(end);
                        this.selectionStart = this.selectionEnd = finalBefore.length;
                    }
                }
                else if (state.pendingKar !== "") {
                    let combined = char + state.pendingKar;
                    this.value = val.substring(0, start) + combined + val.substring(end);
                    this.selectionStart = this.selectionEnd = start + combined.length;
                    state.pendingKar = "";
                }
                else if (char.startsWith('্')) {
                    let textBefore = val.substring(0, start);
                    let lastChar = textBefore.slice(-1);

                    if (['ে', 'ি', 'ৈ', 'ৗ', 'ো', 'ৌ'].includes(lastChar)) {
                        let newBefore = textBefore.slice(0, -1) + char + lastChar;
                        this.value = newBefore + val.substring(end);
                        this.selectionStart = this.selectionEnd = newBefore.length;
                    } else {
                        this.value = val.substring(0, start) + char + val.substring(end);
                        this.selectionStart = this.selectionEnd = start + char.length;
                    }
                }
                else {
                    let textBefore = val.substring(0, start);
                    let lastChar = textBefore.slice(-1);

                    if (lastChar === 'ে' && char === 'া') {
                        this.value = textBefore.slice(0, -1) + 'ো' + val.substring(end);
                        this.selectionStart = this.selectionEnd = start;
                    }
                    else if (lastChar === 'ে' && char === 'ৗ') {
                        this.value = textBefore.slice(0, -1) + 'ৌ' + val.substring(end);
                        this.selectionStart = this.selectionEnd = start;
                    }
                    else {
                        this.value = val.substring(0, start) + char + val.substring(end);
                        this.selectionStart = this.selectionEnd = start + char.length;
                    }
                }

                this.dispatchEvent(new Event('input'));
            }
        }
    });

    input.addEventListener('input', function() {
        if (!active && input.value.length > 0 && !done) {
            active = true;
            timer = setInterval(() => {
                time++;
                document.getElementById('st-time').innerText = time;
                calculateWPM();
            }, 1000);
        }
        updateTyping();
    });

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (done) nextL();
            else if (input.value.length >= chars.length) finish();
        }
    });

            function updateTyping() {
        const typedRaw = input.value.normalize('NFC');
        const typed = Array.from(segmenter.segment(typedRaw)).map(s => s.segment);
        let correct = 0;

        const maxLen = Math.max(typed.length + 2, chars.length);
        const displayDiv = document.getElementById('display-text');

        for(let i = 0; i < maxLen; i++) {
            const el = document.getElementById(`s-${i}`);
            if(!el) continue;

            const targetChar = chars[i] ? chars[i].normalize('NFC') : null;

            if(i < typed.length) {
                if(typed[i] === targetChar) {
                    if(el.className !== "char correct") el.className = "char correct";
                    correct++;
                } else {
                    if(el.className !== "char wrong") el.className = "char wrong";
                }
            } else {
                if (i === typed.length) {
                    if(el.className !== "char current") el.className = "char current";
                } else {
                    if(el.className !== "char") el.className = "char";
                }
            }
        }

        // এক্সট্রা টাইপিং এবং সাধারণ টাইপিং উভয়ের জন্যই নিখুঁত স্ক্রোল ট্র্যাকিং
        if (done || typed.length >= chars.length) {
            // প্যারাগ্রাফ শেষ বা এক্সট্রা টাইপ করার সময় সবসময় স্ক্রোল একদম নিচে লক থাকবে
            displayDiv.scrollTop = displayDiv.scrollHeight;
        } else {
            // স্বাভাবিক টাইপিংয়ের সময় কারেন্ট এলিমেন্ট ট্র্যাক করবে
            const currentEl = document.getElementById(`s-${typed.length}`);
            if (currentEl) {
                const containerHeight = displayDiv.clientHeight;
                const elemTop = currentEl.offsetTop;
                const elemHeight = currentEl.offsetHeight;

                // কারেন্ট ক্যারেক্টারটি যদি স্ক্রিনের বাইরে চলে যেতে নেয়, তখনই স্ক্রোল পজিশন আপডেট হবে
                if ((elemTop + elemHeight) > (displayDiv.scrollTop + containerHeight) || elemTop < displayDiv.scrollTop) {
                    displayDiv.scrollTop = elemTop - (containerHeight / 2) + (elemHeight / 2);
                }
            }
        }

        if(typed.length > 0) {
            document.getElementById('st-acc').innerText = Math.round((correct/typed.length)*100) + "%";
        }

        if(typed.length >= chars.length && !done && chars.length > 0) {
            setTimeout(finish, 100);
        }
    }



    function finish() {
        done = true; active = false; clearInterval(timer);
        const wpm = document.getElementById('st-wpm').innerText;
        const acc = document.getElementById('st-acc').innerText;
        document.getElementById('res-data').innerHTML = `গতি: <b>${wpm} WPM</b><br>নির্ভুলতা: <b>${acc}</b><br>সময়: <b>${time} সেকেন্ড</b>`;
        document.getElementById('modal').style.display = "flex";
    }

    function nextL() {
        document.getElementById('modal').style.display = "none";
        const sel = document.getElementById('lesson-sel');
        sel.selectedIndex = (sel.selectedIndex + 1) % sel.options.length;
        loadLesson();
        input.focus();
    }

    function resetApp() { clearInterval(timer); time = 0; active = false; done = false; input.value = ""; state.pendingKar = ""; state.gPressed = false; document.getElementById('st-time').innerText = "0"; document.getElementById('st-wpm').innerText = "0"; document.getElementById('st-acc').innerText = "100%"; document.getElementById('display-text').scrollTop = 0; input.focus(); }
    function saveC() { const v = document.getElementById('c-in').value.trim(); if(v) { customs.push(v); localStorage.setItem('rah_v11_cust', JSON.stringify(customs)); document.getElementById('c-in').value=""; renderC(); initApp(); } }
    function renderC() { document.getElementById('c-list').innerHTML = customs.map((x,i)=>`<div style="font-size:11px; background:rgba(0,0,0,0.05); padding:6px; margin-top:5px; border-radius:4px; display:flex; justify-content:space-between;"><span>${x.slice(0,20)}...</span><b style="color:red; cursor:pointer;" onclick="delC(${i})">মুছুন</b></div>`).join(''); }
    function delC(i) { customs.splice(i,1); localStorage.setItem('rah_v11_cust', JSON.stringify(customs)); renderC(); initApp(); }
    function updateFSize(v) { document.getElementById('display-text').style.fontSize = v + "px"; }
    function updateFStyle(v) { document.getElementById('display-text').style.fontFamily = v + ", sans-serif"; document.getElementById('input-area').style.fontFamily = v + ", sans-serif"; }
    function updateTheme(v) { document.documentElement.setAttribute('data-theme', v); }

    function calculateWPM() {
        if (time <= 0) return;
        const typedRaw = input.value.normalize('NFC');
        const typed = Array.from(segmenter.segment(typedRaw)).map(s => s.segment);
        const wpm = Math.round((typed.length / 5) / (time / 60));
        document.getElementById('st-wpm').innerText = wpm >= 0 ? wpm : 0;
    }

    window.addEventListener('keydown', (e) => {
        const modal = document.getElementById('modal');
        if (done && modal.style.display === "flex") {
            if (e.key === 'Enter') { e.preventDefault(); nextL(); }
            else if (e.key === 'Escape') { e.preventDefault(); modal.style.display = "none"; fullResetCurrent(); }
            else { modal.style.display = "none"; input.focus(); }
        } else if (e.key === 'Escape') {
            fullResetCurrent();
        }
    });

    function fullResetCurrent() {
        input.value = ""; done = false; active = false; clearInterval(timer); time = 0; state.gPressed = false; state.pendingKar = "";
        document.getElementById('st-time').innerText = "0"; document.getElementById('st-wpm').innerText = "0"; document.getElementById('st-acc').innerText = "100%";
        document.getElementById('display-text').scrollTop = 0;
        chars.forEach((c, i) => {
            const el = document.getElementById(`s-${i}`);
            if (el) el.className = (i === 0) ? "char current" : "char";
        });
        input.focus();
    }

    window.addEventListener('load', () => { renderC(); initApp(); });
</script>
